<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حلول هادئة | Calm Solutions</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <main id="app-container">

        <section id="standard-tier" class="view hidden">
            <header class="std-nav">
                <h1>حلول هادئة</h1>
                <p>النسخة الكلاسيكية</p>
            </header>
            <div class="std-content">
                <h3>حجز موعد جديد</h3>
                <input type="text" id="std-name" placeholder="الاسم بالكامل">
                <input type="tel" id="std-phone" placeholder="رقم الموبايل">
                <button onclick="submitStandard()">تأكيد الحجز</button>
            </div>
        </section>

        <section id="premium-tier" class="view hidden">
            <div class="video-overlay"></div>
            
            <div class="glass-ui">
                <header class="premium-nav">
                    <h2>✨ حلول هادئة Elite</h2>
                    <button id="admin-trigger">لوحة الإدارة 🔒</button>
                </header>

                <div id="ai-chat-box">
                    <div id="display-messages"></div>
                    <div class="chat-controls">
                        <input type="text" id="ai-input" placeholder="تحدث مع المساعد الذكي...">
                        <button id="send-btn">إرسال</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="admin-panel" class="view hidden">
            <div class="admin-grid">
                <nav class="side-menu">
                    <h3>الإدارة</h3>
                    <ul>
                        <li>قائمة المواعيد</li>
                        <li>الإحصائيات</li>
                        <li class="premium-feature">تصدير Excel 📊</li>
                    </ul>
                </nav>
                <div class="main-display">
                    <h2>الحجوزات الحالية</h2>
                    <table id="data-table">
                        </table>
                </div>
            </div>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
